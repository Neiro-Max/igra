<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Секретный штаб</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F3F7F5;
    --panel:#FFFFFF;
    --panel-alt:#EEF3F1;
    --border:#DFE7E3;
    --border-strong:#C7D3CD;
    --text:#152420;
    --text-secondary:#5B6D66;
    --text-muted:#8EA098;
    --accent:#12C88E;
    --accent-tint:#DFFBF0;
    --accent-ink:#0B7A56;
    --accent-dark:#DFFBF0;
    --amber:#FFA724;
    --amber-tint:#FFEFD6;
    --amber-dark:#FFEFD6;
    --amber-ink:#9A5F00;
    --danger:#FF5A4E;
    --danger-tint:#FFE3DF;
    --danger-dark:#FFE3DF;
    --danger-ink:#C23524;
    --violet:#8C6BF2;
    --violet-tint:#EEE7FF;
    --glow:#12C88E;
    --mono:'JetBrains Mono', ui-monospace, monospace;
    --sans:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-reduced-motion: no-preference){
    .spin-glow{ animation: spinGlow 9s linear infinite; }
    .pulse-badge{ animation: pulseBadge 1.6s ease-in-out infinite; }
    .glow-btn{ animation: glowPulse 2.4s ease-in-out infinite; }
    .marquee-track{ animation: marqueeScroll 16s linear infinite; }
  }
  .toast-item{
    background:linear-gradient(135deg, var(--accent), var(--violet)); color:#fff; font-weight:700; font-size:14px;
    padding:12px 18px; border-radius:20px; box-shadow:0 6px 20px rgba(0,0,0,0.25), 0 0 14px 0 var(--glow);
    animation: toastIn .3s ease-out; text-align:center;
  }
  .toast-item.toast-out{ animation: toastOut .35s ease-in forwards; }
  .safe-slot{
    width:44px; height:52px; border:2px solid var(--border-strong); border-radius:8px; background:var(--panel-alt);
    display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:22px; font-weight:700;
  }
  .safe-key{
    padding:14px 0; border-radius:8px; background:var(--panel-alt); border:1px solid var(--border-strong);
    font-family:var(--mono); font-size:17px; font-weight:700; color:var(--text);
  }
  .safe-key:active{ background:var(--accent-tint); border-color:var(--accent); }

  @keyframes toastIn{ from{ opacity:0; transform:translateY(-16px) scale(0.95);} to{ opacity:1; transform:translateY(0) scale(1);} }
  @keyframes toastOut{ from{ opacity:1; transform:translateY(0) scale(1);} to{ opacity:0; transform:translateY(-12px) scale(0.95);} }

  @keyframes spinGlow{
    0%{ transform:rotate(0deg); box-shadow:0 0 14px 3px var(--glow), 0 0 2px 1px var(--glow); }
    50%{ box-shadow:0 0 26px 7px var(--glow), 0 0 4px 2px var(--glow); }
    100%{ transform:rotate(360deg); box-shadow:0 0 14px 3px var(--glow), 0 0 2px 1px var(--glow); }
  }
  @keyframes pulseBadge{
    0%,100%{ box-shadow:0 0 0 0 rgba(255,90,78,0.55); }
    50%{ box-shadow:0 0 0 6px rgba(255,90,78,0); }
  }
  @keyframes glowPulse{
    0%,100%{ box-shadow:0 0 4px 0 var(--glow); }
    50%{ box-shadow:0 0 22px 5px var(--glow); }
  }
  @keyframes marqueeScroll{
    0%{ transform:translateX(0); }
    100%{ transform:translateX(-50%); }
  }
  .marquee-wrap{
    overflow:hidden; white-space:nowrap; background:linear-gradient(90deg, var(--accent), var(--violet)); border:none;
    border-radius:20px; padding:9px 0; margin-bottom:16px; box-shadow:0 0 14px 0 var(--glow);
  }
  .marquee-track{ display:inline-block; padding-left:100%; }
  .marquee-track span{ font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:0.4px; color:#fff; padding:0 18px; }
  .theme-swatch{ width:40px; height:40px; border-radius:50%; border:2px solid var(--border-strong); cursor:pointer; flex-shrink:0; box-shadow:0 0 12px 1px currentColor, inset 0 0 0 1px rgba(255,255,255,0.15); }
  .theme-swatch.active{ border-color:var(--text); box-shadow:0 0 16px 3px currentColor, inset 0 0 0 1px rgba(255,255,255,0.25); }
  .channel-open-panel{
    flex:1; min-height:160px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    background:var(--accent-tint); border:1px dashed var(--border-strong); border-radius:16px; cursor:pointer; padding:20px;
    text-align:center; transition:opacity .15s;
  }
  .channel-open-panel:active{ opacity:0.75; }
  .channel-open-icon{
    width:48px; height:48px; border-radius:50%; background:var(--panel); color:var(--accent-ink);
    display:flex; align-items:center; justify-content:center; font-size:20px;
  }
  .channel-open-title{ font-size:15px; font-weight:500; color:var(--text); }
  .channel-open-sub{ font-size:12px; color:var(--text-secondary); font-family:var(--mono); }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--text); font-family:var(--sans);
    min-height:100vh; display:flex; justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  #app{width:100%; max-width:460px; min-height:100vh; display:flex; flex-direction:column; position:relative;
    background:
      radial-gradient(circle at 12% 6%, rgba(18,200,142,0.10), transparent 42%),
      radial-gradient(circle at 90% 18%, rgba(140,107,242,0.08), transparent 38%),
      radial-gradient(circle at 80% 90%, rgba(255,167,36,0.07), transparent 40%),
      var(--bg);
  }
  .screen{flex:1; display:flex; flex-direction:column; padding:20px 18px 90px;}
  .hidden{display:none !important;}

  /* Header / brand */
  .brand{display:flex; align-items:center; gap:10px; margin-bottom:22px;}
  .brand-mark{width:34px; height:34px; clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%); background:var(--accent-dark); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .brand-mark i{color:var(--accent-ink); font-style:normal; font-family:var(--mono); font-size:14px; font-weight:700;}
  .brand-title{font-family:var(--mono); font-size:13px; letter-spacing:1.5px; color:var(--text-secondary); text-transform:uppercase;}
  .brand-sub{font-size:11px; color:var(--text-muted); font-family:var(--mono); letter-spacing:0.5px;}

  h1{font-family:var(--mono); font-size:20px; font-weight:700; letter-spacing:0.3px; margin-bottom:6px;}
  h2{font-family:var(--mono); font-size:13px; letter-spacing:1px; text-transform:uppercase; color:var(--text-secondary); margin:22px 0 10px;}
  p.lead{color:var(--text-secondary); font-size:14px; line-height:1.6; margin-bottom:20px;}

  /* Inputs */
  input, textarea, select{
    width:100%; background:var(--panel-alt); border:1px solid var(--border-strong); color:var(--text);
    padding:11px 12px; border-radius:6px; font-size:14px; font-family:var(--sans); outline:none;
  }
  input[type="checkbox"], input[type="radio"]{
    width:18px; height:18px; padding:0; border-radius:4px; flex-shrink:0; accent-color:var(--accent);
  }
  input::placeholder, textarea::placeholder{color:var(--text-muted);}
  input:focus, textarea:focus, select:focus{border-color:var(--accent);}
  label.field-label{display:block; font-size:11px; font-family:var(--mono); letter-spacing:0.8px; text-transform:uppercase; color:var(--text-muted); margin:14px 0 6px;}
  label.field-label:first-child{margin-top:0;}
  p.btn-caption{ font-size:12px; color:var(--text-muted); margin:6px 0 16px; line-height:1.4; }

  button{
    font-family:var(--sans); font-size:14px; font-weight:500; border-radius:6px; border:1px solid var(--border-strong);
    background:transparent; color:var(--text); padding:11px 16px; cursor:pointer; transition:opacity .15s;
  }
  button:active{opacity:0.7;}
  .btn-primary{background:linear-gradient(135deg, var(--accent), var(--violet)); border-color:transparent; color:#fff; font-weight:700;}
  .btn-danger-outline{border-color:var(--danger); color:var(--danger);}
  .btn-success{background:linear-gradient(135deg, var(--accent), var(--violet)); border:none; color:#fff; font-weight:700;}
  .btn-block{width:100%;}
  .btn-row{display:flex; gap:8px;}
  .btn-row button{flex:1;}
  .btn-ghost-sm{padding:6px 10px; font-size:12px; border-color:var(--border);}
  .btn-enter{background:var(--accent); color:#0A1F19; border:none; font-weight:700; margin-right:6px;}
  .theme-btn{
    background:var(--accent); color:#0A1F19; border:none; font-weight:700; font-size:12px;
    padding:9px 12px; border-radius:20px; margin-right:8px; box-shadow:0 0 10px 1px var(--glow);
  }

  /* Role chooser cards */
  .choice-card{
    background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:10px;
    display:flex; align-items:center; gap:12px; box-shadow:0 2px 10px rgba(21,36,32,0.05);
  }
  .choice-card:active{border-color:var(--accent);}
  .choice-card .seal{width:38px; height:38px; clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%); display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-weight:700; font-size:13px; flex-shrink:0;}
  .choice-name{font-size:14px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .choice-sub{font-size:12px; color:var(--text-muted); font-family:var(--mono);}

  /* Bottom nav */
  #nav{
    position:fixed; bottom:calc(14px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    width:calc(100% - 32px); max-width:428px;
    background:var(--panel); border:1px solid var(--border); border-radius:30px; display:flex; gap:6px; padding:10px 10px;
    z-index:10; box-shadow:0 8px 24px rgba(21,36,32,0.14);
  }
  #nav::before{
    content:''; position:absolute; top:-15px; left:50%; transform:translateX(-50%);
    width:5px; height:15px; background:var(--border-strong); border-radius:3px;
  }
  #nav::after{
    content:''; position:absolute; top:-23px; left:50%; transform:translateX(-50%);
    width:12px; height:12px; border-radius:50%; background:var(--accent); box-shadow:0 0 10px 2px var(--glow);
  }
  #nav-grille{
    position:absolute; top:-38px; left:50%; transform:translateX(-50%);
    display:flex; gap:4px;
  }
  #nav-grille span{ width:3px; height:9px; border-radius:2px; background:var(--border-strong); }
  #nav button{
    flex:1; background:var(--panel-alt); border:1px solid var(--border); border-radius:18px; display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:8px 2px; color:var(--text-secondary); font-size:10px; font-family:var(--mono); letter-spacing:0.3px; position:relative;
    transition:background .15s, color .15s, box-shadow .15s;
  }
  #nav button.active{
    background:linear-gradient(135deg, var(--accent), var(--violet)); color:#fff; border-color:transparent;
    box-shadow:0 0 12px 0 var(--glow);
  }
  #nav .nav-icon{font-size:17px; font-style:normal;}
  #nav .badge{position:absolute; top:2px; right:10px; background:var(--danger); color:#fff; font-size:9px; font-family:var(--mono); border-radius:8px; padding:1px 5px; min-width:14px; text-align:center;}

  /* Cards general */
  .card{background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:10px; box-shadow:0 2px 10px rgba(21,36,32,0.05);}
  .stat-row{display:flex; gap:10px; margin-bottom:4px;}
  .stat-box{flex:1; background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:14px; box-shadow:0 2px 10px rgba(21,36,32,0.05);}
  .stat-label{font-size:11px; font-family:var(--mono); text-transform:uppercase; letter-spacing:0.6px; color:var(--text-muted); margin-bottom:4px;}
  .stat-value{font-size:22px; font-family:var(--mono); font-weight:700;}

  .progress-track{height:7px; background:var(--panel-alt); border-radius:4px; overflow:hidden; margin-top:8px;}
  .progress-fill{height:100%; background:var(--accent); border-radius:4px;}

  /* Mission card */
  .mission-tab{
    position:absolute; top:0; right:14px; background:var(--accent); color:#0A1F19; font-family:var(--mono);
    font-size:11px; font-weight:700; padding:3px 9px; border-radius:0 0 5px 5px; letter-spacing:0.4px;
    box-shadow:0 0 8px 0 var(--glow);
  }
  .mission-card{position:relative; background:var(--panel); border:1px solid var(--border); border-left:4px solid var(--border-strong); border-radius:14px; padding:16px 14px 14px; margin-bottom:10px; box-shadow:0 2px 10px rgba(21,36,32,0.05);}
  .mission-card.st-open{border-left-color:var(--violet);}
  .mission-card.st-review{border-left-color:var(--amber);}
  .mission-card.st-approved{border-left-color:var(--accent);}
  .mission-card.st-rejected{border-left-color:var(--danger);}
  .mission-title{font-size:14px; font-weight:500; margin-bottom:3px; padding-right:70px;}
  .mission-meta{font-size:12px; color:var(--text-muted); font-family:var(--mono);}
  .status-pill{display:inline-block; font-size:10px; font-family:var(--mono); letter-spacing:0.4px; padding:2px 8px; border-radius:20px; margin-top:8px; text-transform:uppercase;}
  .status-open{background:var(--panel-alt); color:var(--text-secondary); border:1px solid var(--border-strong);}
  .status-review{background:var(--amber); color:#2A1D00;}
  .status-approved{background:var(--accent); color:#0A1F19;}
  .status-rejected{background:var(--danger); color:#2A0A05;}

  /* Reward card */
  .reward-card{display:flex; align-items:center; gap:12px; background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:13px 14px; margin-bottom:10px; box-shadow:0 2px 10px rgba(21,36,32,0.05);}
  .reward-icon{width:38px; height:38px; border-radius:8px; background:var(--panel-alt); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;}
  .reward-title{font-size:14px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .reward-cost{font-size:12px; font-family:var(--mono); color:var(--text-muted);}

  /* Channel list */
  .channel-row{display:flex; align-items:center; gap:12px; padding:11px 4px; border-top:1px solid var(--border); cursor:pointer;}
  .channel-row:first-child{border-top:none;}
  .seal-sm{width:36px; height:36px; clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%); display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-weight:700; font-size:12px; flex-shrink:0;}
  .channel-name{font-size:14px; font-weight:500;}
  .channel-sub{font-size:12px; color:var(--text-muted);}

  /* Chat screen */
  #chatMessages{display:flex; flex-direction:column; gap:9px; flex:1; overflow-y:auto; padding:4px 0 10px;}
  .msg-in{align-self:flex-start; max-width:82%; background:var(--panel); border:1px solid var(--border); border-radius:12px 12px 12px 3px; padding:9px 12px;}
  .msg-out{align-self:flex-end; max-width:82%; background:var(--accent-tint); border-radius:12px 12px 3px 12px; padding:9px 12px;}
  .msg-out p{color:var(--accent-ink);}
  .msg-text{font-size:14px;}
  .msg-meta{font-size:10px; color:var(--text-muted); font-family:var(--mono); margin-top:3px;}
  .msg-action-btn{ background:none; border:none; padding:0 2px; font-size:11px; color:var(--text-muted); cursor:pointer; }
  .msg-action-btn:active{ color:var(--accent); }
  .msg-sender{font-size:11px; font-weight:700; font-family:var(--mono); color:var(--text-secondary); margin-bottom:2px;}
  .chat-input-row{display:flex; gap:8px; align-items:center; border-top:1px solid var(--border); padding-top:12px; margin-top:auto;}
  .chat-input-row input{flex:1;}
  .send-btn{width:40px; height:40px; padding:0; border-radius:50%; background:linear-gradient(135deg, var(--accent), var(--violet)); border:none; color:#fff; font-size:16px; flex-shrink:0; box-shadow:0 0 10px 0 var(--glow);}

  .chat-header{display:flex; align-items:center; gap:10px; padding-bottom:14px; border-bottom:1px solid var(--border); margin-bottom:12px;}
  .back-btn{background:none; border:none; color:var(--text-secondary); font-size:18px; padding:4px 8px 4px 0;}

  .empty-state{text-align:center; padding:40px 10px; color:var(--text-muted);}
  .empty-state .stamp{font-family:var(--mono); font-size:11px; letter-spacing:2px; border:1px dashed var(--border-strong); display:inline-block; padding:6px 14px; border-radius:6px; margin-bottom:10px; transform:rotate(-3deg);}

  .modal-overlay{position:fixed; inset:0; background:rgba(8,12,13,0.72); display:flex; align-items:flex-end; justify-content:center; z-index:100;}
  .modal-sheet{width:100%; max-width:460px; background:var(--panel); border-radius:20px 20px 0 0; padding:20px 18px calc(20px + env(safe-area-inset-bottom)); max-height:85vh; overflow-y:auto; box-shadow:0 -8px 24px rgba(21,36,32,0.12);}
  .modal-title{font-family:var(--mono); font-size:15px; font-weight:700; margin-bottom:14px;}

  .id-card{background:var(--accent-tint); border:1px solid var(--border-strong); border-radius:16px; padding:18px; margin-top:16px;}
  .id-card-top{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px;}
  .id-card-label{font-family:var(--mono); font-size:10px; letter-spacing:1px; color:var(--text-muted); text-transform:uppercase;}

  ::-webkit-scrollbar{width:0; height:0;}
</style>
</head>
<body>
<div id="app">
  <div id="errorBanner" style="display:none; position:fixed; top:0; left:0; right:0; background:#FF5A4E; color:#fff; padding:10px 14px; font-family:monospace; font-size:12px; z-index:9999; white-space:pre-wrap; word-break:break-word;"></div>
  <div id="toastContainer" style="position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:9998; display:flex; flex-direction:column; gap:8px; align-items:center; width:calc(100% - 32px); max-width:420px;"></div>
  <div id="root"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js" crossorigin="anonymous"></script>
<script>
/* ====== НАСТРОЙКА FIREBASE ======
   1. Зайдите на https://console.firebase.google.com, создайте проект (бесплатно).
   2. В настройках проекта добавьте "веб-приложение" и скопируйте объект конфигурации.
   3. В разделе Build → Realtime Database создайте базу (Start in test mode для начала).
   4. Вставьте свои значения ниже вместо ВСТАВЬТЕ_СЮДА.
   5. Загрузите этот файл на GitHub (например, через GitHub Pages) — все устройства,
      открывшие страницу, будут делиться одними и теми же данными в реальном времени. */
const firebaseConfig = {
  apiKey: "AIzaSyDG0pRN_uFu4U5X783soz0EiYkx5j74sz0",
  authDomain: "neiroma-45547.firebaseapp.com",
  databaseURL: "https://neiroma-45547-default-rtdb.firebaseio.com",
  projectId: "neiroma-45547",
  storageBucket: "neiroma-45547.firebasestorage.app",
  messagingSenderId: "750123298549",
  appId: "1:750123298549:web:ac3c9c643b231dc24d1fbc"
};
function showError(msg){
  const el = document.getElementById('errorBanner');
  if(el){ el.textContent = 'Ошибка: ' + msg; el.style.display = 'block'; }
}
let safeGame = null;
let safeGameTimerHandle = null;
const SAFE_GAME_SECONDS = 60;
function startSafeGame(missionId){
  if(safeGameTimerHandle){ clearInterval(safeGameTimerHandle); safeGameTimerHandle = null; }
  const secret = [0,0,0,0].map(()=>Math.floor(Math.random()*10));
  safeGame = { missionId, secret, guesses: [], currentInput: [], won:false, exploded:false, bonus:null, deadline: Date.now() + SAFE_GAME_SECONDS*1000 };
  safeGameTimerHandle = setInterval(()=>{
    if(!safeGame || safeGame.won || safeGame.exploded){ clearInterval(safeGameTimerHandle); safeGameTimerHandle = null; return; }
    if(Date.now() >= safeGame.deadline){
      safeGame.exploded = true;
      clearInterval(safeGameTimerHandle); safeGameTimerHandle = null;
    }
    if(modal && modal.type==='safeGame') render();
  }, 1000);
}
function safeGameFeedback(guess, secret){
  let black = 0;
  const secretRemaining = [];
  const guessRemaining = [];
  for(let i=0;i<4;i++){
    if(guess[i]===secret[i]){ black++; }
    else { secretRemaining.push(secret[i]); guessRemaining.push(guess[i]); }
  }
  let white = 0;
  const used = secretRemaining.map(()=>false);
  guessRemaining.forEach(g=>{
    const idx = secretRemaining.findIndex((s,i)=>s===g && !used[i]);
    if(idx!==-1){ used[idx]=true; white++; }
  });
  return { black, white };
}

function showToast(text){
  const container = document.getElementById('toastContainer');
  if(!container) return;
  const el = document.createElement('div');
  el.className = 'toast-item';
  el.textContent = text;
  container.appendChild(el);

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

function ensureAuth(){
  return new Promise((resolve)=>{
    const unsub = auth.onAuthStateChanged(user=>{
      unsub();
      if(user){ resolve(user); return; }
      auth.signInAnonymously().then(cred=>resolve(cred.user)).catch(err=>{
        showError('вход: ' + err.message);
        resolve(null);
      });
    });
  });
}

const STORAGE_KEY = "hq_state_v1";
const MY_ID_KEY = "hq_my_agent_id";
const ROOM_KEY = "hq_room_id";
let roomId = null;

function generateRoomCode(){
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s = "";
  for(let i=0;i<6;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function loadRoomId(){
  try{ roomId = localStorage.getItem(ROOM_KEY) || null; }catch(e){ roomId = null; }
}
function saveRoomId(id){
  roomId = id;
  try{ localStorage.setItem(ROOM_KEY, id); }catch(e){}
}
function myIdKey(){ return MY_ID_KEY + "_" + roomId; }
function roomRef(path){ return db.ref('rooms/' + roomId + '/' + path); }

async function copyCodeToClipboard(code, feedbackEl){
  let ok = false;
  try{
    await navigator.clipboard.writeText(code);
    ok = true;
  }catch(e){ ok = false; }
  if(!ok){
    try{
      const ta = document.createElement('textarea');
      ta.value = code;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      ta.style.top = '0';
      ta.style.fontSize = '16px';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      ta.setSelectionRange(0, code.length);
      ok = document.execCommand('copy');
      ta.blur();
      document.body.removeChild(ta);
    }catch(e){ ok = false; }
  }
  if(feedbackEl){
    feedbackEl.textContent = ok ? 'скопировано!' : 'не удалось скопировать — выделите номер вручную';
    setTimeout(()=>{ feedbackEl.textContent=''; }, 2500);
  }
}
function shareCode(code){
  const returnTo = modal;
  modal = { type:'shareOptions', code, returnTo };
  render();
}
function wireCodeButtons(){
  const copyBtn = document.getElementById('copyRoomCodeBtn');
  if(copyBtn) copyBtn.onclick = ()=> copyCodeToClipboard(copyBtn.getAttribute('data-code'), document.getElementById('copyFeedback'));
  const shareBtn = document.getElementById('shareRoomCodeBtn');
  if(shareBtn) shareBtn.onclick = ()=> shareCode(shareBtn.getAttribute('data-code'));
  const copyAgainBtn = document.getElementById('shareOptionsCopyAgain');
  if(copyAgainBtn) copyAgainBtn.onclick = ()=> copyCodeToClipboard(copyAgainBtn.getAttribute('data-code'), document.getElementById('copyFeedback'));
}

const THEME_KEY = "hq_theme_v1";
let themeState = { theme:"neon", hue:0 };

function applyTheme(){
  const t = THEMES[themeState.theme] || THEMES.neon;
  const h = ((t.accentH + themeState.hue) % 360 + 360) % 360;
  const s = t.accentS, l = t.accentL;
  const accent = `hsl(${h},${s}%,${l}%)`;
  const accentTint = `hsla(${h},${s}%,${l}%,${t.mode==='dark'?0.28:0.18})`;
  const inkL = t.mode==='dark' ? Math.min(l+22,82) : Math.max(l-20,18);
  const accentInk = `hsl(${h},${s}%,${inkL}%)`;
  const root = document.documentElement.style;
  root.setProperty('--bg', t.bg);
  root.setProperty('--panel', t.panel);
  root.setProperty('--panel-alt', t.panelAlt);
  root.setProperty('--border', t.border);
  root.setProperty('--border-strong', t.borderStrong);
  root.setProperty('--text', t.text);
  root.setProperty('--text-secondary', t.textSecondary);
  root.setProperty('--text-muted', t.textMuted);
  root.setProperty('--amber', t.amber);
  root.setProperty('--amber-tint', t.amberTint);
  root.setProperty('--amber-dark', t.amberTint);
  root.setProperty('--amber-ink', t.amberInk);
  root.setProperty('--danger', t.danger);
  root.setProperty('--danger-tint', t.dangerTint);
  root.setProperty('--danger-dark', t.dangerTint);
  root.setProperty('--danger-ink', t.dangerInk);
  root.setProperty('--violet', t.violet);
  root.setProperty('--violet-tint', t.violetTint);
  root.setProperty('--accent', accent);
  root.setProperty('--accent-tint', accentTint);
  root.setProperty('--accent-dark', accentTint);
  root.setProperty('--accent-ink', accentInk);
  root.setProperty('--glow', accent);
}

async function loadTheme(){
  try{
    const saved = localStorage.getItem(THEME_KEY);
    if(saved) themeState = JSON.parse(saved);
  }catch(e){}
  applyTheme();
}
function saveTheme(){
  try{ localStorage.setItem(THEME_KEY, JSON.stringify(themeState)); }catch(e){}
}

function uid(){ return Math.random().toString(36).slice(2,10); }

function defaultState(){
  return {
    agents: [],
    channels: [
      { id:"hq", name:"штаб-квартира", type:"family", members:"all", status:"active" }
    ],
    missions: [],
    rewards: [],
    rewardRequests: [],
    adjustments: [],
    messages: { hq: [] }
  };
}

function visibleChannelsFor(agentId){
  return state.channels.filter(c=>{
    if(c.type==='family') return true;
    if(isDirector()) return true;
    return Array.isArray(c.members) && c.members.includes(agentId);
  });
}

function channelDisplayName(c, forAgentId){
  if(c.type==='personal'){
    const otherId = c.members.find(m=>m!==forAgentId);
    const other = agentById(otherId);
    return other ? other.name : '?';
  }
  return c.name;
}

function findPersonalChannel(idA, idB){
  return state.channels.find(c=>c.type==='personal' && c.members.includes(idA) && c.members.includes(idB));
}

async function createPersonalRequest(toId){
  const existing = findPersonalChannel(myAgentId, toId);
  if(existing) return existing.id;
  const id = uid();
  state.channels.push({ id, type:'personal', name:null, members:[myAgentId, toId], status:'pending', requestedBy: myAgentId });
  state.messages[id] = [];
  await saveState();
  return id;
}

async function createGroupChannel(name, memberIds){
  const id = uid();
  const members = Array.from(new Set([myAgentId, ...memberIds]));
  state.channels.push({ id, type:'group', name, members, status:'active', createdBy: myAgentId });
  state.messages[id] = [];
  await saveState();
  return id;
}

async function respondToRequest(channelId, approve){
  const idx = state.channels.findIndex(c=>c.id===channelId);
  if(idx===-1) return;
  if(approve){
    state.channels[idx].status = 'active';
  } else {
    state.channels.splice(idx,1);
    delete state.messages[channelId];
  }
  await saveState();
}

function normalizeState(val){
  const d = defaultState();
  const v = val || {};
  const channels = (Array.isArray(v.channels) ? v.channels : d.channels).map(c=>({
    type: c.type || (c.members==='all' ? 'family' : 'personal'),
    status: c.status || 'active',
    ...c
  }));
  const rewards = Array.isArray(v.rewards) ? v.rewards : d.rewards;
  let rewardRequests = Array.isArray(v.rewardRequests) ? v.rewardRequests.slice() : [];
  // migrate legacy single-use reward fields (redeemedBy/requestedBy/status on the reward itself) into rewardRequests
  rewards.forEach(r=>{
    if(r.redeemedBy && !rewardRequests.some(rq=>rq.rewardId===r.id && rq.agentId===r.redeemedBy && rq.status==='approved')){
      rewardRequests.push({ id: uid(), rewardId: r.id, agentId: r.redeemedBy, status:'approved', resolvedAt: r.redeemedAt || Date.now() });
    } else if(r.requestedBy && r.status==='requested' && !rewardRequests.some(rq=>rq.rewardId===r.id && rq.agentId===r.requestedBy && rq.status==='pending')){
      rewardRequests.push({ id: uid(), rewardId: r.id, agentId: r.requestedBy, status:'pending', requestedAt: Date.now() });
    }
    delete r.redeemedBy; delete r.requestedBy; delete r.status; delete r.redeemedAt;
  });
  return {
    agents: Array.isArray(v.agents) ? v.agents : d.agents,
    channels,
    missions: Array.isArray(v.missions) ? v.missions : d.missions,
    rewards,
    rewardRequests,
    adjustments: Array.isArray(v.adjustments) ? v.adjustments : d.adjustments,
    messages: (v.messages && typeof v.messages==='object') ? Object.assign({hq:[]}, v.messages) : d.messages
  };
}

async function loadState(){
  return new Promise((resolve)=>{
    roomRef('appState').once('value', snap=>{
      state = normalizeState(snap.val());
      resolve();
    }, (err)=>{ showError('loadState: '+err.message); state = defaultState(); resolve(); });
  });
}

function watchState(){
  roomRef('appState').on('value', snap=>{
    const val = snap.val();
    if(val){
      state = normalizeState(val);
      if(myAgentId && view!=='loading'){ render(); }
    }
  }, err=>{ showError('watchState: '+err.message); });
}

async function saveState(){
  try{ await roomRef('appState').set(state); }catch(e){ showError('saveState: '+e.message); }
}

let onlineIds = new Set();
const PRESENCE_TTL = 90000;
const HEARTBEAT_INTERVAL = 25000;

async function heartbeat(){
  if(!myAgentId) return;
  try{
    const ref = roomRef('presence/'+myAgentId);
    await ref.set(Date.now());
    ref.onDisconnect().remove();
  }catch(e){ showError('heartbeat: '+e.message); }
}

let presenceInitialized = false;
let lastOnlineIds = new Set();
function watchPresence(){
  roomRef('presence').on('value', snap=>{
    const val = snap.val() || {};
    const now = Date.now();
    onlineIds = new Set(Object.keys(val).filter(id => now - val[id] < PRESENCE_TTL));
    if(presenceInitialized){
      onlineIds.forEach(id=>{
        if(!lastOnlineIds.has(id) && id!==myAgentId){
          const agent = agentById(id);
          if(agent) showToast(`🕵️ ${agent.name} в сети!`);
        }
      });
    }
    presenceInitialized = true;
    lastOnlineIds = onlineIds;
    if(myAgentId && view==='home' && !modal) render();
  }, err=>{ showError('watchPresence: '+err.message); });
}

function me(){ return state.agents.find(a => a.id === myAgentId) || null; }
function agentById(id){ return state.agents.find(a => a.id === id); }
function isDirector(){ const m = me(); return m && m.role === "director"; }

async function deleteAgentById(id){
  state = normalizeState(state);
  state.agents = state.agents.filter(a=>a.id!==id);
  state.missions = state.missions.filter(x=>!missionAssignees(x).includes(id));
  state.rewardRequests = (state.rewardRequests||[]).filter(rq=>rq.agentId!==id);
  state.adjustments = (state.adjustments||[]).filter(a=>a.agentId!==id);

  const channelsToDelete = [];
  state.channels = state.channels.filter(c=>{
    if(c.type==='family') return true;
    if(!Array.isArray(c.members)) return true;
    if(c.type==='personal' && c.members.includes(id)){ channelsToDelete.push(c.id); return false; }
    if(c.type==='group' && c.members.includes(id)){
      c.members = c.members.filter(mid=>mid!==id);
      if(c.members.length < 2){ channelsToDelete.push(c.id); return false; }
    }
    return true;
  });
  channelsToDelete.forEach(chId=>{ delete state.messages[chId]; });

  Object.keys(state.messages).forEach(chId=>{
    state.messages[chId] = (state.messages[chId]||[]).filter(msg=>msg.from!==id);
  });
  await saveState();
  if(myAgentId===id){
    myAgentId=null;
    try{ localStorage.removeItem(myIdKey()); }catch(err){}
    try{ await roomRef('presence/'+id).remove(); }catch(err){}
  }
}

function missionAssignees(msn){
  return Array.isArray(msn.assignedTo) ? msn.assignedTo : [msn.assignedTo];
}
function missionAssigneeNames(msn){
  return missionAssignees(msn).map(id=>{ const a=agentById(id); return a?a.name:'?'; }).join(', ');
}

function pointsBank(agentId){
  return state.missions
    .filter(m => missionAssignees(m).includes(agentId) && m.status === "approved" && !m.redeemed)
    .reduce((sum,m) => sum + m.points, 0);
}
function rewardCostById(rewardId){
  const r = state.rewards.find(x=>x.id===rewardId);
  return r ? r.cost : 0;
}
function pendingRequestedCost(agentId){
  return (state.rewardRequests||[])
    .filter(rq => rq.agentId===agentId && rq.status==='pending')
    .reduce((sum,rq) => sum + rewardCostById(rq.rewardId), 0);
}
function availablePoints(agentId){
  const earned = state.missions.filter(m=>missionAssignees(m).includes(agentId) && m.status==="approved").reduce((s,m)=>s+m.points,0);
  const spent = (state.rewardRequests||[]).filter(rq=>rq.agentId===agentId && rq.status==='approved').reduce((s,rq)=>s+rewardCostById(rq.rewardId),0);
  const adjusted = (state.adjustments||[]).filter(a=>a.agentId===agentId).reduce((s,a)=>s+a.delta,0);
  return earned - spent + adjusted;
}

function pointsHistory(agentId){
  const entries = [];
  state.missions.forEach(m=>{
    if(m.status==='approved' && missionAssignees(m).includes(agentId)){
      entries.push({ ts: m.approvedAt || 0, delta: m.points, label: `миссия: ${m.title}` });
    }
  });
  (state.rewardRequests||[]).forEach(rq=>{
    if(rq.status==='approved' && rq.agentId===agentId){
      const r = state.rewards.find(x=>x.id===rq.rewardId);
      entries.push({ ts: rq.resolvedAt || 0, delta: -(r?r.cost:0), label: `награда: ${r?r.title:'(удалена)'}` });
    }
  });
  (state.adjustments||[]).forEach(a=>{
    if(a.agentId===agentId){
      entries.push({ ts: a.ts || 0, delta: a.delta, label: a.reason ? `корректировка: ${a.reason}` : 'ручная корректировка' });
    }
  });
  entries.sort((a,b)=> b.ts - a.ts);
  return entries;
}

function sealStyle(color){
  return `background:${color}22; color:${color};`;
}
function initials(name){
  const raw = String(name).trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase();
  return escapeHtml(raw);
}

/* ---------- RENDER ---------- */

function render(){
  const root = document.getElementById("root");
  if(view === "loading"){ root.innerHTML = ""; return; }
  if(view === "onboarding"){
    root.innerHTML = renderOnboarding();
    attachOnboardingEvents();
    return;
  }
  if(view === "room"){
    root.innerHTML = renderRoomScreen() + (modal ? renderModal() : '');
    attachRoomEvents();
    return;
  }
  if(!myAgentId || !me()){
    root.innerHTML = renderIdentity() + (modal ? renderModal() : '');
    attachIdentityEvents();
    return;
  }

  let body = "";
  if(view === "home") body = renderHome();
  else if(view === "missions") body = renderMissions();
  else if(view === "review") body = renderReview();
  else if(view === "rewards") body = renderRewards();
  else if(view === "chat") body = renderChat();

  root.innerHTML = `
    <div class="screen" style="padding-bottom:${view==='chat'?'18px':'112px'}; ${view==='chat'?'display:flex;flex-direction:column;min-height:100vh;':''}">
      ${body}
    </div>
    ${view!=='chat' ? renderNav() : ''}
    ${modal ? renderModal() : ''}
  `;
  attachEvents();
}

function renderNav(){
  const pendingReview = state.missions.filter(m=>m.status==="review").length;
  const director = isDirector();
  return `
  <div id="nav">
    <div id="nav-grille" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
    <button data-nav="home" class="${view==='home'?'active':''}"><span class="nav-icon">◈</span>штаб</button>
    <button data-nav="missions" class="${view==='missions'?'active':''}"><span class="nav-icon">✦</span>миссии</button>
    ${director ? `<button data-nav="review" class="${view==='review'?'active':''}" style="position:relative">
        <span class="nav-icon">✓</span>проверка
        ${pendingReview>0?`<span class="badge pulse-badge">${pendingReview}</span>`:''}
      </button>` : ''}
    <button data-nav="rewards" class="${view==='rewards'?'active':''}"><span class="nav-icon">◆</span>награды</button>
  </div>`;
}

function renderOnboarding(){
  const s = ONBOARDING_SLIDES[onboardingStep];
  const isLast = onboardingStep === ONBOARDING_SLIDES.length - 1;
  const dots = ONBOARDING_SLIDES.map((_,i)=>`<span style="width:${i===onboardingStep?'18px':'6px'}; height:6px; border-radius:3px; background:${i===onboardingStep?'var(--accent)':'var(--border-strong)'}; display:inline-block; transition:width .2s;"></span>`).join('<span style="width:6px;"></span>');
  return `
  <div class="screen" style="padding-bottom:40px; display:flex; flex-direction:column; min-height:100vh;">
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
      <div style="margin-bottom:20px;">${s.illustration}</div>
      <h1 style="font-size:22px; margin-bottom:14px;">${s.title}</h1>
      <p class="lead" style="max-width:420px;">${s.text}</p>
    </div>
    <div style="display:flex; justify-content:center; align-items:center; gap:4px; margin-bottom:20px;">${dots}</div>
    <div class="btn-row">
      ${onboardingStep>0 ? `<button id="obBack">назад</button>` : `<button id="obSkip">пропустить</button>`}
      <button class="btn-primary" id="obNext">${isLast ? 'начать →' : 'далее →'}</button>
    </div>
  </div>`;
}

function attachOnboardingEvents(){
  const finish = ()=>{
    try{ localStorage.setItem(ONBOARDING_KEY, '1'); }catch(e){}
    onboardingStep = 0;
    view = roomId ? 'home' : 'room';
    render();
  };
  const skip = document.getElementById('obSkip');
  if(skip) skip.onclick = finish;
  const back = document.getElementById('obBack');
  if(back) back.onclick = ()=>{ onboardingStep = Math.max(0, onboardingStep-1); render(); };
  const next = document.getElementById('obNext');
  if(next) next.onclick = ()=>{
    if(onboardingStep < ONBOARDING_SLIDES.length-1){ onboardingStep++; render(); }
    else finish();
  };
}

function attachRoomEvents(){
  wireCodeButtons();
  const showOnboardingBtn = document.getElementById('showOnboardingBtn');
  if(showOnboardingBtn) showOnboardingBtn.onclick = ()=>{ onboardingStep=0; view='onboarding'; render(); };
  const createBtn = document.getElementById('createRoomBtn');
  if(createBtn) createBtn.onclick = ()=>{
    const code = generateRoomCode();
    modal = { type:'roomCreated', code };
    render();
  };
  const joinBtn = document.getElementById('joinRoomBtn');
  if(joinBtn) joinBtn.onclick = async ()=>{
    const input = document.getElementById('joinRoomCode');
    const code = input.value.trim().toUpperCase();
    const errEl = document.getElementById('joinRoomError');
    if(!code){ if(errEl) errEl.textContent = 'впишите личный номер'; return; }
    if(errEl) errEl.textContent = 'проверяем номер...';
    joinBtn.disabled = true;
    try{
      const snap = await db.ref('rooms/'+code+'/appState').once('value');
      if(!snap.exists()){
        if(errEl) errEl.textContent = 'штаб с таким номером не найден. проверьте номер и попробуйте снова';
        joinBtn.disabled = false;
        return;
      }
    }catch(e){
      if(errEl) errEl.textContent = 'не удалось проверить номер: ' + e.message;
      joinBtn.disabled = false;
      return;
    }
    saveRoomId(code);
    await startRoomSession();
  };
  const overlay = document.getElementById('modalOverlay');
  if(overlay){
    const goBtn = document.getElementById('modalRoomContinue');
    if(goBtn) goBtn.onclick = async ()=>{
      saveRoomId(modal.code);
      modal = null;
      await startRoomSession();
    };
    const cancelBtn = document.getElementById('modalCancel');
    if(cancelBtn) cancelBtn.onclick = ()=>{
      modal = (modal && modal.returnTo) || null;
      render();
    };
  }
}

function missionCardHtml(msn, showDelete){
  const statusLabel = {open:'открыто', review:'на проверке', approved:'подтверждено', rejected:'отклонено'}[msn.status];
  const statusClass = {open:'status-open', review:'status-review', approved:'status-approved', rejected:'status-rejected'}[msn.status];
  const canMarkDone = !isDirector() && missionAssignees(msn).includes(myAgentId) && msn.status==='open' && msn.proposalStatus!=='pending';
  const canRetry = !isDirector() && missionAssignees(msn).includes(myAgentId) && msn.status==='rejected';
  const hasProposal = msn.proposalStatus === 'pending';
  const canPropose = !isDirector() && missionAssignees(msn).includes(myAgentId) && msn.status==='open' && !hasProposal;
  const proposer = hasProposal ? agentById(msn.proposedBy) : null;
  const canPlayBonus = !isDirector() && missionAssignees(msn).includes(myAgentId) && msn.status==='approved' && msn.bonusAvailable && !msn.bonusPlayed;
  return `
  <div class="mission-card st-${msn.status}">
    <div class="mission-tab">${msn.points} О</div>
    <div class="mission-title">${escapeHtml(msn.title)}</div>
    <div class="mission-meta">${escapeHtml(missionAssigneeNames(msn))} ${msn.deadline?'· срок: '+escapeHtml(msn.deadline):''}</div>
    <div><span class="status-pill ${statusClass}">${statusLabel}</span></div>
    ${msn.status==='rejected' && msn.rejectReason ? `<div style="font-size:12px;color:var(--danger);margin-top:6px;">причина: ${escapeHtml(msn.rejectReason)}</div>` : ''}
    ${hasProposal ? `
      <div style="background:var(--amber-tint); border-radius:8px; padding:10px; margin-top:10px;">
        <div style="font-size:13px; font-weight:500;">${isDirector() ? `${proposer?escapeHtml(proposer.name):'?'} предлагает ${msn.proposedPoints} очков вместо ${msn.points}` : `ждём решения: предложено ${msn.proposedPoints} очков вместо ${msn.points}`}</div>
        ${msn.proposalReason ? `<div style="font-size:12px; color:var(--text-secondary); margin-top:4px;">причина: ${escapeHtml(msn.proposalReason)}</div>` : ''}
        ${isDirector() ? `
          <div class="btn-row" style="margin-top:8px;">
            <button class="btn-danger-outline" data-decline-proposal="${msn.id}">отклонить</button>
            <button class="btn-success" data-accept-proposal="${msn.id}">согласиться</button>
          </div>` : ''}
      </div>` : ''}
    ${canMarkDone ? `<button class="btn-primary btn-block glow-btn" style="margin-top:10px" data-mark-done="${msn.id}">отметить выполненным</button>` : ''}
    ${canPropose ? `<button class="btn-ghost-sm btn-block" style="margin-top:8px" data-negotiate-mission="${msn.id}">💬 предложить другую награду</button>` : ''}
    ${canRetry ? `<button class="btn-primary btn-block glow-btn" style="margin-top:10px" data-retry-mission="${msn.id}">исправить и отправить снова</button>` : ''}
    ${canPlayBonus ? `<button class="btn-primary btn-block glow-btn" style="margin-top:10px" data-play-safe="${msn.id}">🔓 взломать сейф — бонусные очки!</button>` : ''}
    ${showDelete && msn.status!=='approved' ? `<button class="btn-ghost-sm" style="margin-top:10px; border-color:var(--danger); color:var(--danger);" data-delete-mission="${msn.id}">удалить миссию</button>` : ''}
    ${showDelete && msn.status==='approved' ? `<div class="btn-caption" style="margin-top:8px; margin-bottom:0;">подтверждённое задание нельзя удалить — очки уже в истории агента</div>` : ''}
  </div>`;
}

  const m = me();
  const director = m.role==='director';
  const pts = director ? null : availablePoints(m.id);
  const pending = director ? null : pendingRequestedCost(m.id);
  const agents = state.agents.filter(a=>a.role==='agent');
  const pendingRequests = (state.rewardRequests||[]).filter(rq=>rq.status==='pending');
  const myPendingRequests = (state.rewardRequests||[]).filter(rq=>rq.status==='pending' && rq.agentId===m.id);
  return `
    <h1>награды</h1>
    ${director ? `<p class="lead">впишите награды, которые агенты смогут получить за накопленные очки</p>
      <button class="btn-primary btn-block" style="margin-bottom:4px" id="newRewardBtn">+ вписать награду</button>
      <p class="btn-caption">например: "поход в кино" за 50 очков. награда остаётся в списке и после получения — её можно выдавать снова</p>`
      : `<div class="card"><div class="stat-label">доступно очков</div><div class="stat-value">${pts}</div>
          ${pending>0?`<div style="font-size:12px;color:var(--text-muted);margin-top:4px;">ещё ${pending} очков в запросах, ждут подтверждения</div>`:''}
          <button class="btn-ghost-sm" style="margin-top:10px;" data-show-history="${m.id}">📜 история начислений и трат</button>
        </div>`}

    ${director && pendingRequests.length>0 ? `
    <h2>запросы на награды</h2>
    ${pendingRequests.map(rq=>{
      const agent = agentById(rq.agentId);
      const reward = state.rewards.find(x=>x.id===rq.rewardId);
      return `
      <div class="card">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
          <div class="seal-sm" style="${sealStyle(agent?agent.color:'#12C88E')}">${agent?initials(agent.name):'?'}</div>
          <div>
            <div class="mission-title" style="padding-right:0">${agent?escapeHtml(agent.name):'?'}</div>
            <div class="mission-meta">запросил награду</div>
          </div>
        </div>
        <div style="font-size:14px; margin-bottom:2px;">${escapeHtml(reward?reward.title:'(награда удалена)')}</div>
        <div class="mission-meta" style="margin-bottom:12px;">${reward?reward.cost:0} очков</div>
        <div class="btn-row">
          <button class="btn-danger-outline" data-decline-reward="${rq.id}">отклонить</button>
          <button class="btn-success glow-btn" data-confirm-reward="${rq.id}">подтвердить выдачу</button>
        </div>
      </div>`;
    }).join('')}` : ''}

    ${!director && myPendingRequests.length>0 ? `
    <h2>ваши запросы</h2>
    ${myPendingRequests.map(rq=>{
      const reward = state.rewards.find(x=>x.id===rq.rewardId);
      return `
      <div class="reward-card" style="opacity:0.75">
        <div class="reward-icon">◆</div>
        <div style="flex:1"><div class="reward-title">${escapeHtml(reward?reward.title:'(награда удалена)')}</div><div class="reward-cost">${reward?reward.cost:0} очков · ждём подтверждения от директора</div></div>
      </div>`;
    }).join('')}` : ''}

    ${director && agents.length>0 ? `
    <h2>баланс очков агентов</h2>
    <p class="btn-caption" style="margin-top:0;">используйте это только для исправления ошибок — обычно очки начисляются автоматически при подтверждении миссий</p>
    ${agents.map(a=>`
      <div class="card" style="display:flex; align-items:center; justify-content:space-between; padding:12px 14px;">
        <div style="display:flex; align-items:center; gap:10px; min-width:0; flex:1;">
          <div class="seal-sm" style="${sealStyle(a.color)}">${initials(a.name)}</div>
          <div style="min-width:0;">
            <div style="font-size:14px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(a.name)}</div>
            <div style="font-size:12px; color:var(--text-muted);">${availablePoints(a.id)} очков</div>
          </div>
        </div>
        <div style="display:flex; flex-direction:column; gap:6px; flex-shrink:0;">
          <button class="btn-ghost-sm" data-show-history="${a.id}">📜 история</button>
          <button class="btn-ghost-sm" data-adjust-points="${a.id}">исправить баланс</button>
        </div>
      </div>
    `).join('')}` : ''}

    <h2>список наград</h2>
    ${state.rewards.length===0 ? `<div class="empty-state">${illoGift()}<div class="stamp">пусто</div><div>наград пока нет</div></div>` :
      state.rewards.map(r=>{
        const canRequest = !director && (availablePoints(myAgentId) - pendingRequestedCost(myAgentId)) >= r.cost;
        return `
        <div class="reward-card">
          <div class="reward-icon">◆</div>
          <div style="flex:1; min-width:0;">
            <div class="reward-title">${escapeHtml(r.title)}</div>
            <div class="reward-cost">${r.cost} очков</div>
          </div>
          ${!director ? `<button class="btn-ghost-sm" ${canRequest?'':'disabled style="opacity:0.4"'} data-request-reward="${r.id}">запросить</button>` : `
            <div style="display:flex; flex-direction:column; gap:6px; flex-shrink:0;">
              <button class="btn-ghost-sm" data-edit-reward="${r.id}">изменить</button>
              <button class="btn-ghost-sm" data-delete-reward="${r.id}" style="border-color:var(--danger); color:var(--danger);">удалить</button>
            </div>
          `}
        </div>`;
      }).join('')}

    ${!director ? `<h2>история получения</h2>
      ${(state.rewardRequests||[]).filter(rq=>rq.status==='approved' && rq.agentId===myAgentId).length===0 ? `<div style="font-size:13px;color:var(--text-muted)">пока ничего не получено</div>` :
        (state.rewardRequests||[]).filter(rq=>rq.status==='approved' && rq.agentId===myAgentId).map(rq=>{
          const reward = state.rewards.find(x=>x.id===rq.rewardId);
          return `<div class="reward-card" style="opacity:0.6"><div class="reward-icon">✓</div><div style="flex:1"><div class="reward-title">${escapeHtml(reward?reward.title:'(награда удалена)')}</div><div class="reward-cost">получено · ${reward?reward.cost:0} очков</div></div></div>`;
        }).join('')}` : ''}
  `;
}

function renderChat(){
  const ch = state.channels.find(c=>c.id===activeChannelId);
  const msgs = state.messages[activeChannelId] || [];
  const m = me();
  const chName = channelDisplayName(ch, m.id);
  const sub = ch.type==='family' ? 'вся семья · на связи' : (ch.type==='group' ? `группа · ${ch.members.length} участников` : 'личный канал');
  return `
    <div class="chat-header">
      <button class="back-btn" data-nav="home">←</button>
      <div class="seal-sm" style="background:var(--accent-tint); color:var(--accent-ink);">${initials(chName)}</div>
      <div style="flex:1">
        <div class="channel-name">${escapeHtml(chName)}</div>
        <div class="channel-sub">${sub}</div>
      </div>
    </div>
    <div id="chatMessages">
      ${msgs.length===0 ? `<div class="empty-state">${illoEnvelope()}<div class="stamp">тихо</div><div>сообщений пока нет</div></div>` :
        msgs.map(msg=>{
          const sender = agentById(msg.from);
          const mine = msg.from === myAgentId;
          if(msg.type==='mission'){
            return `<div class="mission-card" style="align-self:flex-start; width:88%;">
              <div class="mission-tab">${msg.points} О</div>
              <div class="mission-meta" style="margin-bottom:4px;">новая миссия</div>
              <div class="mission-title" style="padding-right:70px;">${escapeHtml(msg.title)}</div>
              <div class="mission-meta">${msg.deadline?'срок: '+escapeHtml(msg.deadline):''}</div>
            </div>`;
          }
          return `<div class="${mine?'msg-out':'msg-in'}">
            ${!mine?`<div class="msg-sender">${sender?escapeHtml(sender.name):'?'}</div>`:''}
            <div class="msg-text">${escapeHtml(msg.text)}</div>
            <div class="msg-meta" style="display:flex; align-items:center; gap:6px;">
              <span>${msg.time}${msg.edited?' · изменено':''}</span>
              ${mine ? `<button class="msg-action-btn" data-edit-msg="${msg.id}" aria-label="изменить">✎</button>` : ''}
              ${(mine || isDirector()) ? `<button class="msg-action-btn" data-delete-msg="${msg.id}" aria-label="удалить">✕</button>` : ''}
            </div>
          </div>`;
        }).join('')}
    </div>
    <div class="chat-input-row">
      <input id="chatInput" placeholder="сообщение..." autocomplete="off"/>
      <button class="send-btn" id="sendMsgBtn">→</button>
    </div>
  `;
}

  if(modal.type === 'safeGame'){

    const msn = state.missions.find(x=>x.id===modal.missionId);
    if(safeGame.won){
      return `<div class="modal-overlay" id="modalOverlay">

          <div style="font-size:44px; margin-bottom:8px;">🔓</div>

          <div style="font-family:var(--mono); font-size:32px; font-weight:700; letter-spacing:4px; color:var(--accent-ink); margin-top:8px; user-select:text; -webkit-user-select:text;">${modal.code}</div>
        </div>
        <div class="btn-row" style="margin-top:14px">
          <button id="copyRoomCodeBtn" data-code="${modal.code}">скопировать номер</button>

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- EVENTS ---------- */

function attachIdentityEvents(){
  document.querySelectorAll('[data-select-agent]').forEach(el=>{
    el.onclick = async ()=>{
      saveMyId(el.getAttribute('data-select-agent'));
      await heartbeat();
      view = 'home';
      render();
    };
  });
  document.querySelectorAll('[data-delete-agent]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const id = el.getAttribute('data-delete-agent');
      modal = {type:'confirmDelete', agentId:id, from:'identity'};
      render();
    };
  });
  const btn = document.getElementById('createAgentBtn');
  if(btn) btn.onclick = async ()=>{
    const name = document.getElementById('newAgentName').value.trim();
    if(!name) return;
    const role = document.getElementById('newAgentRole').value;
    const color = SEAL_COLORS[state.agents.length % SEAL_COLORS.length];
    const id = uid();
    state.agents.push({id, name, role, color});
    await saveState();
    saveMyId(id);
    await heartbeat();
    view = 'home';
    render();
  };

  const modalCancel = document.getElementById('modalCancel');
  if(modalCancel) modalCancel.onclick = ()=>{ modal = (modal && modal.returnTo) || null; render(); };
  const modalConfirmDelete = document.getElementById('modalConfirmDelete');
  if(modalConfirmDelete) modalConfirmDelete.onclick = async ()=>{
    await deleteAgentById(modal.agentId);
    modal=null;
    render();
  };
}

function attachEvents(){
  wireCodeButtons();
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.onclick = ()=>{ view = el.getAttribute('data-nav'); render(); };
  });
  document.querySelectorAll('[data-open-channel]').forEach(el=>{
    el.onclick = ()=>{ activeChannelId = el.getAttribute('data-open-channel'); view='chat'; render(); setTimeout(scrollChatBottom,0); };
  });
  document.querySelectorAll('[data-mark-done]').forEach(el=>{
    el.onclick = async ()=>{
      const id = el.getAttribute('data-mark-done');
      const msn = state.missions.find(x=>x.id===id);
      if(msn){ msn.status='review'; await saveState(); render(); }
    };
  });
  document.querySelectorAll('[data-negotiate-mission]').forEach(el=>{
    el.onclick = ()=>{ modal = {type:'negotiateMission', missionId: el.getAttribute('data-negotiate-mission')}; render(); };
  });
  document.querySelectorAll('[data-accept-proposal]').forEach(el=>{
    el.onclick = async ()=>{
      const msn = state.missions.find(x=>x.id===el.getAttribute('data-accept-proposal'));
      if(msn){
        msn.points = msn.proposedPoints;
        msn.proposalStatus = null;
        msn.proposedPoints = null;
        msn.proposalReason = '';
        msn.proposedBy = null;
        await saveState(); render();
      }
    };
  });
  document.querySelectorAll('[data-decline-proposal]').forEach(el=>{
    el.onclick = async ()=>{
      const msn = state.missions.find(x=>x.id===el.getAttribute('data-decline-proposal'));
      if(msn){
        msn.proposalStatus = null;
        msn.proposedPoints = null;
        msn.proposalReason = '';
        msn.proposedBy = null;
        await saveState(); render();
      }
    };
  });
  document.querySelectorAll('[data-play-safe]').forEach(el=>{
    el.onclick = ()=>{
      const missionId = el.getAttribute('data-play-safe');
      startSafeGame(missionId);
      modal = {type:'safeGame', missionId};
      render();
    };
  });
  document.querySelectorAll('[data-retry-mission]').forEach(el=>{
    el.onclick = async ()=>{
      const id = el.getAttribute('data-retry-mission');
      const msn = state.missions.find(x=>x.id===id);
      if(msn){ msn.status='review'; msn.rejectReason=''; await saveState(); render(); }
    };
  });
  document.querySelectorAll('[data-delete-mission]').forEach(el=>{
    el.onclick = async ()=>{
      const id = el.getAttribute('data-delete-mission');
      const msn = state.missions.find(x=>x.id===id);
      if(msn && msn.status==='approved') return;
      state.missions = state.missions.filter(x=>x.id!==id);
      await saveState(); render();
    };
  });
  document.querySelectorAll('[data-approve]').forEach(el=>{
    el.onclick = async ()=>{
      const id = el.getAttribute('data-approve');
      const msn = state.missions.find(x=>x.id===id);
      if(msn){ msn.status='approved'; msn.approvedAt = Date.now(); msn.bonusAvailable = true; await saveState(); render(); }
    };
  });
  document.querySelectorAll('[data-reject]').forEach(el=>{
    el.onclick = ()=>{ modal = {type:'reject', missionId: el.getAttribute('data-reject')}; render(); };
  });
  document.querySelectorAll('[data-request-reward]').forEach(el=>{
    el.onclick = async ()=>{
      const rewardId = el.getAttribute('data-request-reward');
      const r = state.rewards.find(x=>x.id===rewardId);
      if(r && (availablePoints(myAgentId) - pendingRequestedCost(myAgentId)) >= r.cost){
        state.rewardRequests = state.rewardRequests || [];
        state.rewardRequests.push({ id:uid(), rewardId, agentId: myAgentId, status:'pending', requestedAt: Date.now() });
        await saveState(); render();
      }
    };
  });
  document.querySelectorAll('[data-confirm-reward]').forEach(el=>{
    el.onclick = async ()=>{
      const id = el.getAttribute('data-confirm-reward');
      const rq = (state.rewardRequests||[]).find(x=>x.id===id);
      if(rq){
        rq.status = 'approved';
        rq.resolvedAt = Date.now();
        await saveState(); render();
      }
    };
  });
  document.querySelectorAll('[data-decline-reward]').forEach(el=>{
    el.onclick = async ()=>{
      const id = el.getAttribute('data-decline-reward');
      state.rewardRequests = (state.rewardRequests||[]).filter(x=>x.id!==id);
      await saveState(); render();
    };
  });
  document.querySelectorAll('[data-edit-reward]').forEach(el=>{
    el.onclick = ()=>{ modal = {type:'newReward', rewardId: el.getAttribute('data-edit-reward')}; render(); };
  });
  document.querySelectorAll('[data-adjust-points]').forEach(el=>{
    el.onclick = ()=>{ modal = {type:'adjustPoints', agentId: el.getAttribute('data-adjust-points')}; render(); };
  });
  document.querySelectorAll('[data-show-history]').forEach(el=>{
    el.onclick = ()=>{ modal = {type:'pointsHistory', agentId: el.getAttribute('data-show-history')}; render(); };
  });
  document.querySelectorAll('[data-delete-reward]').forEach(el=>{
    el.onclick = async ()=>{
      state.rewards = state.rewards.filter(r=>r.id!==el.getAttribute('data-delete-reward'));
      await saveState(); render();
    };
  });
  document.querySelectorAll('[data-approve-request]').forEach(el=>{
    el.onclick = async ()=>{ await respondToRequest(el.getAttribute('data-approve-request'), true); render(); };
  });
  document.querySelectorAll('[data-reject-request]').forEach(el=>{
    el.onclick = async ()=>{ await respondToRequest(el.getAttribute('data-reject-request'), false); render(); };
  });
  document.querySelectorAll('[data-open-profile]').forEach(el=>{
    el.onclick = ()=>{ modal = {type:'profile'}; render(); };
  });
  const themeBtn = document.querySelector('[data-open-theme]');
  if(themeBtn) themeBtn.onclick = ()=>{ modal = {type:'theme'}; render(); };
  const rulesBtn = document.querySelector('[data-open-rules]');
  if(rulesBtn) rulesBtn.onclick = ()=>{ modal = {type:'rules'}; render(); };
  const newChatBtn = document.querySelector('[data-open-newchat]');
  if(newChatBtn) newChatBtn.onclick = ()=>{ modal = {type:'newChat'}; render(); };
  const newMissionBtn = document.getElementById('newMissionBtn');
  if(newMissionBtn) newMissionBtn.onclick = ()=>{ modal={type:'newMission'}; render(); };
  const newRewardBtn = document.getElementById('newRewardBtn');
  if(newRewardBtn) newRewardBtn.onclick = ()=>{ modal={type:'newReward'}; render(); };

  const sendBtn = document.getElementById('sendMsgBtn');
  if(sendBtn){
    const doSend = async ()=>{
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if(!text) return;
      const now = new Date();
      const time = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
      state.messages[activeChannelId] = state.messages[activeChannelId] || [];
      state.messages[activeChannelId].push({id:uid(), from:myAgentId, text, time, type:'text'});
      await saveState();
      render();
      setTimeout(scrollChatBottom,0);
    };
    sendBtn.onclick = doSend;
    const inputEl = document.getElementById('chatInput');
    inputEl.onkeydown = (e)=>{ if(e.key==='Enter') doSend(); };
    inputEl.focus();
  }
  document.querySelectorAll('[data-edit-msg]').forEach(el=>{
    el.onclick = ()=>{ modal = {type:'editMessage', channelId: activeChannelId, msgId: el.getAttribute('data-edit-msg')}; render(); };
  });
  document.querySelectorAll('[data-delete-msg]').forEach(el=>{
    el.onclick = ()=>{ modal = {type:'confirmDeleteMessage', channelId: activeChannelId, msgId: el.getAttribute('data-delete-msg')}; render(); };
  });

  const overlay = document.getElementById('modalOverlay');
  if(overlay){
    const cancel = document.getElementById('modalCancel');
    if(cancel) cancel.onclick = ()=>{ modal = (modal && modal.returnTo) || null; render(); };

    const saveMsgEdit = document.getElementById('modalSaveMessageEdit');
    if(saveMsgEdit) saveMsgEdit.onclick = async ()=>{
      const newText = document.getElementById('editMsgText').value.trim();
      if(!newText){ modal=null; render(); return; }
      const msgs = state.messages[modal.channelId] || [];
      const msg = msgs.find(x=>x.id===modal.msgId);
      if(msg){ msg.text = newText; msg.edited = true; }
      await saveState();
      modal=null; render();
      setTimeout(scrollChatBottom,0);
    };

    const confirmDeleteMsg = document.getElementById('modalConfirmDeleteMessage');
    if(confirmDeleteMsg) confirmDeleteMsg.onclick = async ()=>{
      state.messages[modal.channelId] = (state.messages[modal.channelId]||[]).filter(x=>x.id!==modal.msgId);
      await saveState();
      modal=null; render();
    };

    document.querySelectorAll('[data-pick-theme]').forEach(el=>{
      el.onclick = async ()=>{
        themeState.theme = el.getAttribute('data-pick-theme');
        applyTheme();
        await saveTheme();
        render();
      };
    });
    const hueSlider = document.getElementById('hueSlider');
    if(hueSlider){
      hueSlider.oninput = ()=>{
        themeState.hue = parseInt(hueSlider.value)||0;
        applyTheme();
      };
      hueSlider.onchange = async ()=>{ await saveTheme(); };
    }

    document.querySelectorAll('[data-request-chat]').forEach(el=>{
      el.onclick = async ()=>{
        const toId = el.getAttribute('data-request-chat');
        await createPersonalRequest(toId);
        modal = null; render();
      };
    });
    const createGroupBtn = document.getElementById('createGroupBtn');
    if(createGroupBtn) createGroupBtn.onclick = async ()=>{
      const name = document.getElementById('groupName').value.trim();
      if(!name) return;
      const memberIds = Array.from(document.querySelectorAll('.group-member-cb:checked')).map(cb=>cb.value);
      if(memberIds.length===0) return;
      await createGroupChannel(name, memberIds);
      modal = null; render();
    };

    const confirmDeleteBtn = document.getElementById('modalConfirmDelete');
    if(confirmDeleteBtn) confirmDeleteBtn.onclick = async ()=>{
      await deleteAgentById(modal.agentId);
      modal=null; render();
    };

    const switchAgent = document.getElementById('modalSwitchAgent');
    if(switchAgent) switchAgent.onclick = async ()=>{
      const prevId = myAgentId;
      myAgentId = null;
      try{ localStorage.removeItem(myIdKey()); }catch(e){}
      try{ if(prevId) await roomRef('presence/'+prevId).remove(); }catch(e){}
      modal = null; render();
    };

    const showRulesBtn = document.getElementById('modalShowRules');
    if(showRulesBtn) showRulesBtn.onclick = ()=>{ modal = {type:'rules'}; render(); };
    const showCodeBtn = document.getElementById('modalShowCode');
    if(showCodeBtn) showCodeBtn.onclick = ()=>{ modal = {type:'codeOfConduct'}; render(); };
    const showCodeFromRulesBtn = document.getElementById('modalShowCodeFromRules');
    if(showCodeFromRulesBtn) showCodeFromRulesBtn.onclick = ()=>{ modal = {type:'codeOfConduct'}; render(); };
    const replayOnboardBtn = document.getElementById('modalReplayOnboarding');
    if(replayOnboardBtn) replayOnboardBtn.onclick = ()=>{ modal=null; onboardingStep=0; view='onboarding'; render(); };
    const replayOnboardFromRulesBtn = document.getElementById('modalReplayOnboardingFromRules');
    if(replayOnboardFromRulesBtn) replayOnboardFromRulesBtn.onclick = ()=>{ modal=null; onboardingStep=0; view='onboarding'; render(); };

    const deleteSelf = document.getElementById('modalDeleteSelf');
    if(deleteSelf) deleteSelf.onclick = ()=>{
      modal = {type:'confirmDelete', agentId: myAgentId, from:'profile'};
      render();
    };

    const switchRoom = document.getElementById('modalSwitchRoom');
    if(switchRoom) switchRoom.onclick = async ()=>{
      try{ db.ref('rooms/'+roomId+'/appState').off(); db.ref('rooms/'+roomId+'/presence').off(); }catch(e){}
      if(myAgentId){ try{ await roomRef('presence/'+myAgentId).remove(); }catch(e){} }
      myAgentId = null;
      try{ localStorage.removeItem(ROOM_KEY); }catch(e){}
      roomId = null;
      modal = null;
      view = 'room';
      render();
    };

    const deleteRoomBtn = document.getElementById('modalDeleteRoom');
    if(deleteRoomBtn) deleteRoomBtn.onclick = ()=>{ modal = {type:'confirmDeleteRoom'}; render(); };

    const confirmDeleteRoomBtn = document.getElementById('modalConfirmDeleteRoom');
    if(confirmDeleteRoomBtn) confirmDeleteRoomBtn.onclick = async ()=>{
      const typed = document.getElementById('confirmRoomCodeInput').value.trim().toUpperCase();
      if(typed !== roomId) return;
      try{
        db.ref('rooms/'+roomId+'/appState').off();
        db.ref('rooms/'+roomId+'/presence').off();
        await db.ref('rooms/'+roomId).remove();
      }catch(e){ showError('deleteRoom: '+e.message); }
      try{ localStorage.removeItem(myIdKey()); }catch(e){}
      try{ localStorage.removeItem(ROOM_KEY); }catch(e){}
      myAgentId = null;
      roomId = null;
      modal = null;
      view = 'room';
      render();
    };

    const sendProposal = document.getElementById('modalSendProposal');
    if(sendProposal) sendProposal.onclick = async ()=>{
      const missionId = sendProposal.getAttribute('data-mission-id');
      const points = parseInt(document.getElementById('proposedPoints').value);
      const reason = document.getElementById('proposalReason').value.trim();
      const errEl = document.getElementById('negotiateFormError');
      if(!points || points<1){ if(errEl) errEl.textContent = 'впишите количество очков'; return; }
      const msn = state.missions.find(x=>x.id===missionId);
      if(msn){
        msn.proposedPoints = points;
        msn.proposalReason = reason;
        msn.proposalStatus = 'pending';
        msn.proposedBy = myAgentId;
        await saveState();
      }
      modal = null; render();
    };

    const createMission = document.getElementById('modalCreateMission');
    if(createMission) createMission.onclick = async ()=>{
      const title = document.getElementById('mTitle').value.trim();
      const assignedTo = Array.from(document.querySelectorAll('.mission-assignee-cb:checked')).map(cb=>cb.value);
      const points = parseInt(document.getElementById('mPoints').value)||10;
      const deadline = document.getElementById('mDeadline').value.trim();
      const errEl = document.getElementById('missionFormError');
      if(!title){ if(errEl) errEl.textContent = 'впишите название задания'; return; }
      if(assignedTo.length===0){ if(errEl) errEl.textContent = 'выберите хотя бы одного агента'; return; }
      const msn = {id:uid(), title, assignedTo, points, deadline, status:'open', createdBy: myAgentId};
      state.missions.push(msn);
      state.messages.hq = state.messages.hq || [];
      state.messages.hq.push({id:uid(), type:'mission', title, points, deadline, from:myAgentId});
      await saveState();
      modal=null; view='missions'; render();
    };

    const confirmReject = document.getElementById('modalConfirmReject');
    if(confirmReject) confirmReject.onclick = async ()=>{
      const reason = document.getElementById('rejectReason').value.trim();
      const msn = state.missions.find(x=>x.id===modal.missionId);
      if(msn){ msn.status='rejected'; msn.rejectReason = reason; }
      await saveState();
      modal=null; render();
    };

    document.querySelectorAll('[data-safe-digit]').forEach(el=>{
      el.onclick = ()=>{
        if(!safeGame || safeGame.currentInput.length>=4) return;
        safeGame.currentInput.push(parseInt(el.getAttribute('data-safe-digit')));
        render();
      };
    });
    const safeBackspace = document.getElementById('safeBackspace');
    if(safeBackspace) safeBackspace.onclick = ()=>{
      if(safeGame) safeGame.currentInput.pop();
      render();
    };
    const safeSubmit = document.getElementById('safeSubmit');
    if(safeSubmit) safeSubmit.onclick = async ()=>{
      if(!safeGame || safeGame.currentInput.length<4) return;
      const guess = safeGame.currentInput.slice();
      const fb = safeGameFeedback(guess, safeGame.secret);
      safeGame.guesses.push({ guess, black: fb.black, white: fb.white });
      safeGame.currentInput = [];
      if(fb.black === 4){
        safeGame.won = true;
        safeGame.bonus = 200;
        const msn = state.missions.find(x=>x.id===safeGame.missionId);
        if(msn) msn.bonusPlayed = true;
        state.adjustments = state.adjustments || [];
        state.adjustments.push({ id:uid(), agentId: myAgentId, delta: safeGame.bonus, reason: `бонус за взлом сейфа: ${msn?msn.title:''}`, ts: Date.now() });
        await saveState();
      }
      render();
    };
    const claimSafeBonus = document.getElementById('claimSafeBonus');
    if(claimSafeBonus) claimSafeBonus.onclick = ()=>{
      if(safeGameTimerHandle){ clearInterval(safeGameTimerHandle); safeGameTimerHandle=null; }
      safeGame = null;
      modal = null;
      render();
    };
    const safeRetry = document.getElementById('safeRetry');
    if(safeRetry) safeRetry.onclick = ()=>{
      startSafeGame(modal.missionId);
      render();
    };

    const applyAdjust = document.getElementById('modalApplyAdjust');
    if(applyAdjust) applyAdjust.onclick = async ()=>{
      const agentId = applyAdjust.getAttribute('data-agent-id');
      const delta = parseInt(document.getElementById('adjustDelta').value);
      if(!delta) { modal=null; render(); return; }
      const reason = document.getElementById('adjustReason').value.trim();
      state.adjustments = state.adjustments || [];
      state.adjustments.push({ id:uid(), agentId, delta, reason, createdBy: myAgentId, ts: Date.now() });
      await saveState();
      modal=null; render();
    };

    const createReward = document.getElementById('modalCreateReward');
    if(createReward) createReward.onclick = async ()=>{
      const title = document.getElementById('rTitle').value.trim();
      const cost = parseInt(document.getElementById('rCost').value)||10;
      const errEl = document.getElementById('rewardFormError');
      if(!title){ if(errEl) errEl.textContent = 'впишите название награды'; return; }
      const editId = createReward.getAttribute('data-reward-id');
      if(editId){
        const r = state.rewards.find(x=>x.id===editId);
        if(r){ r.title = title; r.cost = cost; }
      } else {
        state.rewards.push({id:uid(), title, cost});
      }
      await saveState();
      modal=null; render();
    };
  }
}

function scrollChatBottom(){
  const el = document.getElementById('chatMessages');
  if(el) el.scrollTop = el.scrollHeight;
}

/* ---------- INIT ---------- */
(async function init(){
  await loadTheme();
  loadRoomId();
  let seenOnboarding = false;
  try{ seenOnboarding = !!localStorage.getItem(ONBOARDING_KEY); }catch(e){}
  if(!roomId && !seenOnboarding){
    view = 'onboarding';
    render();
  } else if(!roomId){
    view = 'room';
    render();
  } else {
    await startRoomSession();
  }
  setInterval(()=>{ if(roomId) heartbeat(); }, HEARTBEAT_INTERVAL);
  window.addEventListener('beforeunload', ()=>{
    if(myAgentId && roomId){ try{ roomRef('presence/'+myAgentId).remove(); }catch(e){} }
  });
})();
</script>
</body>
</html>
