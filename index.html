function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- EVENTS ---------- */

function attachIdentityEvents(){
  const wrongRoomBtn = document.getElementById('wrongRoomBtn');
  if(wrongRoomBtn) wrongRoomBtn.onclick = ()=>{
    try{ db.ref('rooms/'+roomId+'/appState').off(); db.ref('rooms/'+roomId+'/presence').off(); }catch(e){}
    try{ localStorage.removeItem(ROOM_KEY); }catch(e){}
    roomId = null;
    view = 'room';
    render();
  };
  document.querySelectorAll('[data-select-agent]').forEach(el=>{
    el.onclick = async ()=>{
      const id = el.getAttribute('data-select-agent');
      const agent = agentById(id);
      if(agent && agent.role==='director'){
        // Вход под директором всегда требует PIN (или его первичной настройки для старых профилей).
        modal = {type:'directorPinLogin', agentId:id};
        render();
        return;
      }
      saveMyId(id);
      await heartbeat();
      view = 'home';
      render();
    };
  });
  document.querySelectorAll('[data-delete-agent]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const id = el.getAttribute('data-delete-agent');
      modal = {type:'confirmDelete', agentId:id, from:'identity'};
      render();
    };
  });

  const roleSelect = document.getElementById('newAgentRole');
  const pinBlock = document.getElementById('newDirectorPinBlock');
  const syncPinBlock = ()=>{ if(pinBlock) pinBlock.classList.toggle('hidden', !roleSelect || roleSelect.value!=='director'); };
  if(roleSelect){ roleSelect.onchange = syncPinBlock; syncPinBlock(); }

  const btn = document.getElementById('createAgentBtn');
  if(btn) btn.onclick = async ()=>{
    const errEl = document.getElementById('createAgentError');
    if(errEl) errEl.textContent = '';
    const name = document.getElementById('newAgentName').value.trim();
    if(!name){ if(errEl) errEl.textContent = 'впишите позывной'; return; }
    const role = document.getElementById('newAgentRole').value;
    const color = SEAL_COLORS[state.agents.length % SEAL_COLORS.length];
    const id = uid();
    const newAgent = {id, name, role, color, warnings:0, blockedUntil:null, permanentlyBlocked:false, pendingWarningAck:false};

    if(role === 'director'){
      const pin = document.getElementById('newAgentPin').value.trim();
      const pinConfirm = document.getElementById('newAgentPinConfirm').value.trim();
      if(!isValidPin(pin)){ if(errEl) errEl.textContent = 'PIN директора — ровно 4 цифры'; return; }
      if(pin !== pinConfirm){ if(errEl) errEl.textContent = 'PIN и подтверждение не совпадают'; return; }
      if(state.agents.some(a=>a.role==='director')){
        if(errEl) errEl.textContent = 'в штабе уже есть директор — обновите страницу';
        return;
      }
      btn.disabled = true;
      // Атомарно "занимаем" место директора — если кто-то успел стать директором
      // на другом устройстве на долю секунды раньше, claimDirectorSlot вернёт false.
      const claimed = await claimDirectorSlot(id);
      btn.disabled = false;
      if(!claimed){
        // Пишем во "флеш"-переменную, а не напрямую в DOM: render() ниже
        // полностью пересоздаёт разметку экрана, и обычный errEl.textContent потерялся бы.
        identityNotice = 'в этом штабе уже появился директор буквально сейчас — войдите в его профиль или создайте агента с ролью «агент»';
        // Перечитываем актуальное состояние из БД (без записи!), чтобы не затереть
        // слот директора, который мог только что законно занять кто-то другой.
        await loadState();
        render();
        return;
      }
      newAgent.directorPinHash = await hashPin(pin);
    }

    state.agents.push(newAgent);
    await saveState();
    saveMyId(id);
    await heartbeat();
    view = 'home';
    render();
  };

  const modalCancel = document.getElementById('modalCancel');
  if(modalCancel) modalCancel.onclick = ()=>{ modal = (modal && modal.returnTo) || null; render(); };
  const modalConfirmDelete = document.getElementById('modalConfirmDelete');
  if(modalConfirmDelete) modalConfirmDelete.onclick = async ()=>{
    if(!(await verifyDeleteAgentGuard(modal.agentId))) return;
    await deleteAgentById(modal.agentId);
    modal=null;
    render();
  };

  const dirPinSubmit = document.getElementById('modalDirPinSubmit');
  if(dirPinSubmit) dirPinSubmit.onclick = async ()=>{
    const errEl = document.getElementById('dirPinError');
    const agentId = dirPinSubmit.getAttribute('data-agent-id');
    const needsSetup = dirPinSubmit.getAttribute('data-needs-setup') === '1';
    const pin = document.getElementById('dirPinInput').value.trim();
    const agent = agentById(agentId);
    if(!agent){ modal=null; render(); return; }

    if(needsSetup){
      const pinConfirm = document.getElementById('dirPinConfirm').value.trim();
      if(!isValidPin(pin)){ if(errEl) errEl.textContent = 'PIN — ровно 4 цифры'; return; }
      if(pin !== pinConfirm){ if(errEl) errEl.textContent = 'PIN и подтверждение не совпадают'; return; }
      agent.directorPinHash = await hashPin(pin);
      await saveState();
      await repairDirectorLock();
      saveMyId(agentId);
      await heartbeat();
      modal = null; view = 'home';
      render();
      return;
    }

    if(!isValidPin(pin)){ if(errEl) errEl.textContent = 'PIN — ровно 4 цифры'; return; }
    const hash = await hashPin(pin);
    if(hash !== agent.directorPinHash){ if(errEl) errEl.textContent = 'неверный PIN'; return; }
    saveMyId(agentId);
    await heartbeat();
    modal = null; view = 'home';
    render();
  };
}

function attachEvents(){
  wireCodeButtons();
  if(modal && modal.type==='snakeGame' && snakeGame && !snakeGame.gameOver && !snakeGame.loopStarted){
    snakeGame.loopStarted = true;
    drawSnakeCanvas();
    snakeGame.loopHandle = setInterval(snakeTick, 180);
  }
  if(modal && modal.type==='tetrisGame' && tetrisGame && !tetrisGame.gameOver && !tetrisGame.loopStarted){
    tetrisGame.loopStarted = true;
    drawTetrisCanvas();
    tetrisGame.loopHandle = setInterval(tetrisTick, 600);
  }
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.onclick = ()=>{
      if(snakeGame && snakeGame.loopHandle){ clearInterval(snakeGame.loopHandle); snakeGame=null; }
      if(tetrisGame && tetrisGame.loopHandle){ clearInterval(tetrisGame.loopHandle); tetrisGame=null; }
      modal = null;
      view = el.getAttribute('data-nav');
      render();
    };
  });
  document.querySelectorAll('[data-open-channel]').forEach(el=>{
    el.onclick = ()=>{ activeChannelId = el.getAttribute('data-open-channel'); view='chat'; render(); setTimeout(scrollChatBottom,0); };
  });
  document.querySelectorAll('[data-delete-channel]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      modal = {type:'confirmDeleteChannel', channelId: el.getAttribute('data-delete-channel')};
      render();
    };
  });
  document.querySelectorAll('[data-mark-done]').forEach(el=>{
    el.onclick = async ()=>{
      const id = el.getAttribute('data-mark-done');
      const msn = state.missions.find(x=>x.id===id);
      if(msn){ msn.status='review'; await saveState(); render(); }
    };
  });
  document.querySelectorAll('[data-negotiate-mission]').forEach(el=>{
    el.onclick = ()=>{ modal = {type:'negotiateMission', missionId: el.getAttribute('data-negotiate-mission')}; render(); };
  });
  document.querySelectorAll('[data-accept-proposal]').forEach(el=>{
    el.onclick = async ()=>{
      const msn = state.missions.find(x=>x.id===el.getAttribute('data-accept-proposal'));
      if(msn){
        msn.points = msn.proposedPoints;
        msn.proposalStatus = null;
        msn.proposedPoints = null;
        msn.proposalReason = '';
        msn.proposedBy = null;
        await saveState(); render();
      }
    };
  });
  document.querySelectorAll('[data-decline-proposal]').forEach(el=>{
    el.onclick = async ()=>{
      const msn = state.missions.find(x=>x.id===el.getAttribute('data-decline-proposal'));
      if(msn){
        const proposerAgent = agentById(msn.proposedBy);
        if(proposerAgent){
          proposerAgent.pendingProposalDecline = { title: msn.title, points: msn.proposedPoints };
        }
        msn.proposalStatus = null;
        msn.proposedPoints = null;
        msn.proposalReason = '';
        msn.proposedBy = null;
        await saveState(); render();
      }
    };
  });
  document.querySelectorAll('[data-launch-game]').forEach(el=>{
    el.onclick = ()=>{
      const type = el.getAttribute('data-launch-game');
      if(type==='memoryGame') startMemoryGame();
      if(type==='cipherGame') startCipherGame();
      if(type==='anagramGame') startAnagramGame();
      if(type==='reactionGame') startReactionGame();
      if(type==='snakeGame') startSnakeGame();
      if(type==='tetrisGame') startTetrisGame();
      modal = {type};
      render();
    };
  });
  document.querySelectorAll('[data-play-safe]').forEach(el=>{
    el.onclick = ()=>{
      const missionId = el.getAttribute('data-play-safe');
      startSafeGame(missionId);
      modal = {type:'safeGame', missionId};
      render();
    };
  });
  document.querySelectorAll('[data-retry-mission]').forEach(el=>{
    el.onclick = async ()=>{
      const id = el.getAttribute('data-retry-mission');
      const msn = state.missions.find(x=>x.id===id);
      if(msn){ msn.status='review'; msn.rejectReason=''; await saveState(); render(); }
    };
  });
  document.querySelectorAll('[data-delete-mission]').forEach(el=>{
    el.onclick = ()=>{
      const id = el.getAttribute('data-delete-mission');
      const msn = state.missions.find(x=>x.id===id);
      if(msn && msn.status==='approved') return;
      modal = {type:'confirmDeleteMission', missionId:id};
      render();
    };
  });
  document.querySelectorAll('[data-approve]').forEach(el=>{
    el.onclick = async ()=>{

      const title = document.getElementById('rTitle').value.trim();
      const cost = parseInt(document.getElementById('rCost').value)||10;
      const errEl = document.getElementById('rewardFormError');
      if(!title){ if(errEl) errEl.textContent = 'впишите название награды'; return; }
      const editId = createReward.getAttribute('data-reward-id');
      if(editId){
        const r = state.rewards.find(x=>x.id===editId);
        if(r){ r.title = title; r.cost = cost; }
      } else {
        state.rewards.push({id:uid(), title, cost});
      }
      await saveState();
      modal=null; render();
    };
  }
}

function scrollChatBottom(){
  const el = document.getElementById('chatMessages');
  if(el) el.scrollTop = el.scrollHeight;
}

/* ---------- INIT ---------- */
(async function init(){
  render();
  await ensureAuth();
  await loadTheme();
  loadRoomId();
  let seenOnboarding = false;
  try{ seenOnboarding = !!localStorage.getItem(ONBOARDING_KEY); }catch(e){}
  if(!roomId && !seenOnboarding){
    view = 'onboarding';
    render();
  } else if(!roomId){
    view = 'room';
    render();
  } else {
    await startRoomSession();
  }
  setInterval(()=>{ if(roomId) heartbeat(); }, HEARTBEAT_INTERVAL);
  window.addEventListener('beforeunload', ()=>{
    if(myAgentId && roomId){ try{ roomRef('presence/'+myAgentId).remove(); }catch(e){} }
  });
})();
</script>
